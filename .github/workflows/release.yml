name: Release

# Publishes a GitHub Release with cross-platform binaries whenever a version
# tag is pushed, e.g.:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Vet & test
        run: |
          go vet ./...
          go test ./...

      - name: Build release binaries
        run: bash scripts/build-release.sh "${GITHUB_REF_NAME}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "forge ${GITHUB_REF_NAME}" \
            --generate-notes
