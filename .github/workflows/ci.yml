name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        if: hashFiles('go.mod') != ''
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Vet
        if: hashFiles('go.mod') != ''
        run: go vet ./...

      - name: Build
        if: hashFiles('go.mod') != ''
        run: go build ./...

      - name: Test
        if: hashFiles('go.mod') != ''
        run: go test -v -race ./...
